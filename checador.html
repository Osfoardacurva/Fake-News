<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checador de Notícias</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      color: #333;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      background: #5cb85c;
      color: white;
      padding: 30px 20px;
      text-align: center;
      border-radius: 0 0 10px 10px;
    }
    h1 { margin: 0; }
    h2 {
      color: #5cb85c;
      margin-top: 30px;
    }
    .card {
      background: white;
      padding: 25px;
      margin: 20px 0;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
      color: #555;
    }
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
      resize: vertical;
    }
    textarea:focus {
      border-color: #5cb85c;
      outline: none;
    }
    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 2px dashed #ddd;
      border-radius: 6px;
      background: #fafafa;
      cursor: pointer;
    }
    .divisor {
      text-align: center;
      margin: 20px 0;
      color: #888;
      font-weight: bold;
    }
    .botao-analisar {
      width: 100%;
      background: #5cb85c;
      color: white;
      border: none;
      padding: 18px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
    }
    .botao-analisar:hover { background: #4cae4c; }
    #resultado {
      margin-top: 25px;
      padding: 20px;
      border-radius: 6px;
      display: none;
    }
    nav { text-align: center; margin: 20px 0; }
    nav a { margin: 0 15px; color: #5cb85c; text-decoration: none; font-weight: bold; }
    .dica {
      background: #d9edf7;
      border-left: 4px solid #31708f;
      padding: 15px;
      border-radius: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Checador de Notícias</h1>
    <p>Descubra se uma informação é verdadeira ou falsa</p>
  </header>

  <div class="container">
    <nav>
      <a href="index.html">Início</a>
      <a href="fake.html">Exemplos</a>
      <a href="checador.html">Checador</a>
    </nav>

    <div class="card">
      <h2>Analise sua notícia</h2>
      
      <form id="form-checador">
        <label for="texto-noticia">1. Cole o texto da notícia:</label>
        <textarea id="texto-noticia" rows="8" placeholder="Ex: 'Médicos descobrem que limão cura câncer...'"></textarea>
        
        <div class="divisor">OU</div>
        
        <label for="imagem-noticia">2. Envie um print/imagem:</label>
        <input type="file" id="imagem-noticia" accept="image/*">
        
        <button type="submit" class="botao-analisar">Analisar Agora</button>
      </form>

      <div id="resultado"></div>
    </div>

    <div class="dica">
      <strong>Dica:</strong> Por enquanto este checador é apenas visual. Para checagem real, consulte sempre agências como Lupa e Aos Fatos.
    </div>

  </div>
</body>
</html>
